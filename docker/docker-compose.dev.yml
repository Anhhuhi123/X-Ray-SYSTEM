# =============================================================================
# SurfSense — Development Docker Compose
# =============================================================================
# Usage (from repo root):
#   docker compose -f docker/docker-compose.dev.yml up --build
#
# This file builds from source and includes dev tools like pgAdmin.
# For production with prebuilt images, use docker/docker-compose.yml instead.
# =============================================================================

name: nfd-dev

services:
  db:
    image: pgvector/pgvector:pg16
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgresql.conf:/etc/postgresql/postgresql.conf:ro
    environment:
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-postgres}
      - POSTGRES_DB=${DB_NAME:-nfd}
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-nfd}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ../nbd_backend
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ../nbd_backend/app:/app/app
      - shared_temp:/shared_tmp
    env_file:
      - ../nbd_backend/.env
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@${DB_HOST:-db}:${DB_PORT:-5432}/${DB_NAME:-nfd}}
      - CELERY_BROKER_URL=${REDIS_URL:-redis://redis:6379/0}
      - CELERY_RESULT_BACKEND=${REDIS_URL:-redis://redis:6379/0}
      - REDIS_APP_URL=${REDIS_URL:-redis://redis:6379/0}
      - CELERY_TASK_DEFAULT_QUEUE=nfd
      - PYTHONPATH=/app
      - UVICORN_LOOP=asyncio
      - UNSTRUCTURED_HAS_PATCHED_LOOP=1
      - LANGCHAIN_TRACING_V2=false
      - LANGSMITH_TRACING=false
      - AUTH_TYPE=${AUTH_TYPE:-LOCAL}
      - NEXT_FRONTEND_URL=${NEXT_FRONTEND_URL:-http://localhost:3000}
      # Daytona Sandbox – uncomment and set credentials to enable cloud code execution
      # - DAYTONA_SANDBOX_ENABLED=TRUE
      # - DAYTONA_API_KEY=${DAYTONA_API_KEY:-}
      # - DAYTONA_API_URL=${DAYTONA_API_URL:-https://app.daytona.io/api}
      # - DAYTONA_TARGET=${DAYTONA_TARGET:-us}
      - SERVICE_ROLE=api
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 30
      start_period: 200s

  celery_worker:
    build: ../nbd_backend
    volumes:
      - ../nbd_backend/app:/app/app
      - shared_temp:/shared_tmp
    env_file:
      - ../nbd_backend/.env
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@${DB_HOST:-db}:${DB_PORT:-5432}/${DB_NAME:-nfd}}
      - CELERY_BROKER_URL=${REDIS_URL:-redis://redis:6379/0}
      - CELERY_RESULT_BACKEND=${REDIS_URL:-redis://redis:6379/0}
      - REDIS_APP_URL=${REDIS_URL:-redis://redis:6379/0}
      - CELERY_TASK_DEFAULT_QUEUE=nfd
      - PYTHONPATH=/app
      - SERVICE_ROLE=worker

  celery_beat:
    build: ../nbd_backend
    env_file:
      - ../nbd_backend/.env
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@${DB_HOST:-db}:${DB_PORT:-5432}/${DB_NAME:-nfd}}
      - CELERY_BROKER_URL=${REDIS_URL:-redis://redis:6379/0}
      - CELERY_RESULT_BACKEND=${REDIS_URL:-redis://redis:6379/0}
      - CELERY_TASK_DEFAULT_QUEUE=nfd
      - PYTHONPATH=/app
      - SERVICE_ROLE=beat
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      celery_worker:
        condition: service_started

  frontend:
    build:
      context: ../nbd_web
      target: deps
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - ../nbd_web:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_FASTAPI_BACKEND_URL=${NEXT_PUBLIC_FASTAPI_BACKEND_URL:-http://localhost:8000}
      - NEXT_PUBLIC_FASTAPI_BACKEND_AUTH_TYPE=${NEXT_PUBLIC_FASTAPI_BACKEND_AUTH_TYPE:-LOCAL}
      - NEXT_PUBLIC_ETL_SERVICE=${NEXT_PUBLIC_ETL_SERVICE:-DOCLING}
      - NEXT_PUBLIC_DEPLOYMENT_MODE=${NEXT_PUBLIC_DEPLOYMENT_MODE:-self-hosted}
    env_file:
      - ../nbd_web/.env
    command: pnpm run dev

volumes:
  postgres_data:
    name: nfd-dev-postgres
  pgadmin_data:
    name: nfd-dev-pgadmin
  redis_data:
    name: nfd-dev-redis
  shared_temp:
    name: nfd-dev-shared-temp
